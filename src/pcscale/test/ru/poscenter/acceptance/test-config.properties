# JPos Scale Test Configuration
# Для использования с Pos2ProtocolEmulator

# Логическое имя устройства в JPos конфигурации
logical.device.name=ScaleSimulator

# COM-порт для эмулятора (должен быть парным к порту драйвера)
emulator.port=COM5

# Таймауты (в миллисекундах)
timeout.read=5000
timeout.claim=5000
timeout.event=10000

# Параметры весов
max.weight=30000
weight.units=grams

# Включение/выключение тестов (можно использовать для фильтрации)
test.enabled.openclose=true
test.enabled.claim=true
test.enabled.capabilities=true
test.enabled.basic=true
test.enabled.sync=true
test.enabled.async=true
test.enabled.tare=true
test.enabled.zero=true
test.enabled.display=true
test.enabled.price=true
test.enabled.power=true
test.enabled.statistics=true
test.enabled.clear=true
test.enabled.freeze=true
test.enabled.edges=true
test.enabled.info=true
test.enabled.health=true
test.enabled.directio=true
test.enabled.concurrent=true
test.enabled.zerovalid=true